name: Deploy Backend

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-backend:
    name: Build Native Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Native Image via Docker
        run: |
          chmod +x backend/mvnw
          cd backend && ./mvnw clean package -Dnative -DskipTests -Dquarkus.native.container-build=true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: backend/target/function.zip
          retention-days: 1

  deploy-infra:
    name: Deploy CDK Infrastructure
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'infra/package-lock.json'

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-artifact
          path: backend/target

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Set AWS Account ID
        run: |
          echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Deploy Infrastructure
        env:
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          STAGE: ${{ secrets.STAGE || 'dev' }}
          FRONTEND_PROD_URL: ${{ secrets.FRONTEND_PROD_URL }}
        run: make deploy
